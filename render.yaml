services:
  - type: web
    name: hydromind-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python -m app.ml.train
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: CORS_ORIGINS
        value: https://your-frontend.vercel.app,http://localhost:5173
      - key: GEMINI_API_KEY
        sync: false
      - key: N8N_WEBHOOK_URL
        sync: false
      - key: FIREBASE_DATABASE_URL
        sync: false
